name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false

  build:
    name: Build ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows targets
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            cross: false
            artifact_name: carpenter930.dll
            asset_name: carpenter930-${{ needs.create-release.outputs.version }}-x86_64-pc-windows-msvc

          - os: windows-latest
            target: x86_64-pc-windows-gnu
            cross: false
            artifact_name: carpenter930.dll
            asset_name: carpenter930-${{ needs.create-release.outputs.version }}-x86_64-pc-windows-gnu

          # Linux targets
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            cross: false
            artifact_name: libcarpenter930.so
            asset_name: carpenter930-${{ needs.create-release.outputs.version }}-x86_64-unknown-linux-gnu

          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            cross: true
            artifact_name: libcarpenter930.so
            asset_name: carpenter930-${{ needs.create-release.outputs.version }}-x86_64-unknown-linux-musl

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            cross: true
            artifact_name: libcarpenter930.so
            asset_name: carpenter930-${{ needs.create-release.outputs.version }}-aarch64-unknown-linux-gnu

          # macOS targets
          - os: macos-latest
            target: x86_64-apple-darwin
            cross: false
            artifact_name: libcarpenter930.dylib
            asset_name: carpenter930-${{ needs.create-release.outputs.version }}-x86_64-apple-darwin

          - os: macos-latest
            target: aarch64-apple-darwin
            cross: false
            artifact_name: libcarpenter930.dylib
            asset_name: carpenter930-${{ needs.create-release.outputs.version }}-aarch64-apple-darwin

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build with cargo
        if: ${{ !matrix.cross }}
        run: cargo build --release --features ffi --target ${{ matrix.target }}

      - name: Build with cross
        if: matrix.cross
        run: cross build --release --features ffi --target ${{ matrix.target }}

      - name: Strip binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: strip target/${{ matrix.target }}/release/${{ matrix.artifact_name }} || true

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $asset_path = "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}"
          Compress-Archive -Path $asset_path -DestinationPath "${{ matrix.asset_name }}.zip"

      - name: Create archive (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.asset_name }}.tar.gz ${{ matrix.artifact_name }}
          cd ../../..

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./${{ matrix.asset_name }}.zip
          asset_name: ${{ matrix.asset_name }}.zip
          asset_content_type: application/zip

      - name: Upload Unix artifact
        if: runner.os != 'Windows'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./${{ matrix.asset_name }}.tar.gz
          asset_name: ${{ matrix.asset_name }}.tar.gz
          asset_content_type: application/gzip
